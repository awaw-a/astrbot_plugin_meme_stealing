<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>表情包管理</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div id="auth-mask" class="auth-mask" hidden>
      <section class="auth-dialog" role="dialog" aria-modal="true" aria-labelledby="auth-title">
        <h2 id="auth-title">身份校验</h2>
        <p>请输入插件配置中的管理面板 Token。</p>
        <form id="auth-form">
          <label>
            管理 Token
            <input id="token-input" type="password" autocomplete="current-password" placeholder="输入 admin_token" />
          </label>
          <div id="auth-error" class="auth-error" aria-live="polite"></div>
          <button type="submit">进入管理面板</button>
        </form>
      </section>
    </div>

    <header class="topbar">
      <div>
        <h1>表情包管理</h1>
        <p id="stats">等待身份校验...</p>
      </div>
      <div class="filters">
        <input id="q" type="search" placeholder="搜索描述、标签、hash" />
        <select id="status">
          <option value="">全部</option>
          <option value="pending">待审核</option>
          <option value="enabled">已启用</option>
          <option value="disabled">已禁用</option>
        </select>
        <button id="select-all" class="secondary">全选</button>
        <button id="clear-selection" class="secondary">清空选择</button>
        <button id="batch-delete" class="danger">批量删除</button>
        <button id="refresh">刷新</button>
        <button id="logout" class="secondary">更换 Token</button>
      </div>
    </header>

    <main id="grid" class="grid"></main>

    <div class="pager">
      <button id="load-more" class="secondary" hidden>加载更多</button>
    </div>

    <template id="card-template">
      <article class="card">
        <img class="preview" alt="表情包预览" />
        <div class="meta">
          <div class="row">
            <label class="select-label"><input class="select-meme" type="checkbox" /> <strong class="meme-id"></strong></label>
            <label><input class="enabled" type="checkbox" /> 启用</label>
            <label><input class="pending" type="checkbox" /> 待审核</label>
          </div>
          <div class="record-details">
            <span class="group-id"></span>
            <span class="created-at"></span>
          </div>
          <label>
            描述
            <textarea class="description" rows="3"></textarea>
          </label>
          <label>
            标签
            <input class="tags" type="text" />
          </label>
          <label>
            情绪
            <input class="emotion" type="text" />
          </label>
          <div class="row">
            <span class="use-count"></span>
            <button class="save">保存</button>
            <button class="delete danger">删除</button>
          </div>
        </div>
      </article>
    </template>

    <script>
      const TOKEN_STORAGE_KEY = "astrbot_meme_panel_token";
      const PAGE_SIZE = 120;
      let currentOffset = 0;
      let token = new URLSearchParams(location.search).get("token") || localStorage.getItem(TOKEN_STORAGE_KEY) || "";

      const authMask = document.querySelector("#auth-mask");
      const authForm = document.querySelector("#auth-form");
      const tokenInput = document.querySelector("#token-input");
      const authError = document.querySelector("#auth-error");
      const grid = document.querySelector("#grid");
      const stats = document.querySelector("#stats");
      const q = document.querySelector("#q");
      const status = document.querySelector("#status");
      const selectAll = document.querySelector("#select-all");
      const clearSelection = document.querySelector("#clear-selection");
      const batchDelete = document.querySelector("#batch-delete");
      const refresh = document.querySelector("#refresh");
      const logout = document.querySelector("#logout");
      const loadMore = document.querySelector("#load-more");
      const tmpl = document.querySelector("#card-template");

      function withToken(path) {
        const join = path.includes("?") ? "&" : "?";
        return `${path}${join}token=${encodeURIComponent(token)}`;
      }

      async function request(path, options = {}) {
        const res = await fetch(withToken(path), {
          ...options,
          headers: {
            "Content-Type": "application/json",
            "X-Admin-Token": token,
            ...(options.headers || {}),
          },
        });
        if (res.status === 401) {
          throw new Error("Token 无效，请重新输入。");
        }
        if (!res.ok) {
          throw new Error(await res.text());
        }
        return res.json();
      }

      function showAuth(message = "") {
        authError.textContent = message;
        authMask.hidden = false;
        tokenInput.value = token || "";
        setTimeout(() => tokenInput.focus(), 0);
      }

      function hideAuth() {
        authMask.hidden = true;
        authError.textContent = "";
      }

      async function validateToken(candidate) {
        token = candidate.trim();
        if (!token) {
          throw new Error("请输入 Token。");
        }
        await request("/api/stats");
        localStorage.setItem(TOKEN_STORAGE_KEY, token);
        const url = new URL(location.href);
        url.searchParams.delete("token");
        history.replaceState(null, "", url.toString());
      }

      function csvToList(value) {
        return value
          .split(/[,，、\s]+/)
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function listToCsv(value) {
        return (value || []).join(",");
      }

      function formatDate(value) {
        if (!value) return "未知";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleString();
      }

      function renderStats(data) {
        const s = data.stats || data || {};
        const selected = selectedIds().length;
        stats.textContent = `总数 ${s.total || 0} / 启用 ${s.enabled || 0} / 待审核 ${s.pending_review || 0} / 今日保存 ${s.saved_today || 0} / 已选择 ${selected}`;
      }

      function selectedIds() {
        return Array.from(document.querySelectorAll(".select-meme:checked"))
          .map((input) => Number(input.closest(".card").dataset.id))
          .filter(Boolean);
      }

      function updateSelectionStats() {
        const selected = selectedIds().length;
        const base = stats.textContent.replace(/ \/ 已选择 \d+$/, "");
        stats.textContent = `${base} / 已选择 ${selected}`;
      }

      function renderItem(item) {
        const node = tmpl.content.cloneNode(true);
        const card = node.querySelector(".card");
        card.dataset.id = item.id;
        node.querySelector(".preview").src = withToken(`/images/${item.id}`);
        node.querySelector(".meme-id").textContent = `#${item.id}`;
        node.querySelector(".select-meme").addEventListener("change", updateSelectionStats);
        node.querySelector(".enabled").checked = item.enabled;
        node.querySelector(".pending").checked = item.pending_review;
        node.querySelector(".group-id").textContent = `来源群聊：${item.source_group_id || "未知"}`;
        node.querySelector(".created-at").textContent = `保存时间：${formatDate(item.created_at)}`;
        node.querySelector(".description").value = item.description || "";
        node.querySelector(".tags").value = listToCsv(item.tags);
        node.querySelector(".emotion").value = listToCsv(item.emotion);
        node.querySelector(".use-count").textContent = `使用 ${item.use_count || 0} 次`;

        node.querySelector(".save").addEventListener("click", async () => {
          await request(`/api/memes/${item.id}`, {
            method: "PATCH",
            body: JSON.stringify({
              description: card.querySelector(".description").value,
              tags: csvToList(card.querySelector(".tags").value),
              emotion: csvToList(card.querySelector(".emotion").value),
              enabled: card.querySelector(".enabled").checked,
              pending_review: card.querySelector(".pending").checked,
            }),
          });
          await load();
        });

        node.querySelector(".delete").addEventListener("click", async () => {
          if (!confirm(`删除 #${item.id}？`)) return;
          await request(`/api/memes/${item.id}`, { method: "DELETE" });
          await load();
        });
        return node;
      }

      async function load(options = {}) {
        const append = Boolean(options.append);
        if (!append) {
          currentOffset = 0;
          loadMore.hidden = true;
          grid.innerHTML = "<div class='empty'>加载中...</div>";
        }
        loadMore.disabled = true;
        const params = new URLSearchParams({
          q: q.value.trim(),
          status: status.value,
          limit: String(PAGE_SIZE),
          offset: String(currentOffset),
        });
        const data = await request(`/api/memes?${params.toString()}`);
        if (!append) {
          grid.innerHTML = "";
        }
        if (!data.items.length && !append) {
          grid.innerHTML = "<div class='empty'>没有匹配的表情包</div>";
          loadMore.hidden = true;
          renderStats(data);
          return;
        }
        data.items.forEach((item) => grid.appendChild(renderItem(item)));
        currentOffset += data.items.length;
        loadMore.hidden = !data.has_more;
        loadMore.disabled = false;
        renderStats(data);
      }

      authForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        authError.textContent = "";
        try {
          await validateToken(tokenInput.value);
          hideAuth();
          await load();
        } catch (err) {
          showAuth(err.message || "Token 校验失败。");
        }
      });

      refresh.addEventListener("click", () => {
        load().catch((err) => showAuth(err.message));
      });
      loadMore.addEventListener("click", () => {
        load({ append: true }).catch((err) => showAuth(err.message));
      });
      selectAll.addEventListener("click", () => {
        document.querySelectorAll(".select-meme").forEach((input) => {
          input.checked = true;
        });
        updateSelectionStats();
      });
      clearSelection.addEventListener("click", () => {
        document.querySelectorAll(".select-meme").forEach((input) => {
          input.checked = false;
        });
        updateSelectionStats();
      });
      batchDelete.addEventListener("click", async () => {
        const ids = selectedIds();
        if (!ids.length) {
          alert("请先选择要删除的表情包。");
          return;
        }
        if (!confirm(`确定删除已选择的 ${ids.length} 张表情包？`)) return;
        await request("/api/memes/batch-delete", {
          method: "POST",
          body: JSON.stringify({ ids }),
        });
        await load();
      });
      q.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          load().catch((err) => showAuth(err.message));
        }
      });
      status.addEventListener("change", () => {
        load().catch((err) => showAuth(err.message));
      });
      logout.addEventListener("click", () => {
        localStorage.removeItem(TOKEN_STORAGE_KEY);
        token = "";
        grid.innerHTML = "";
        stats.textContent = "等待身份校验...";
        showAuth();
      });

      async function boot() {
        if (!token) {
          showAuth();
          return;
        }
        try {
          await validateToken(token);
          hideAuth();
          await load();
        } catch (err) {
          localStorage.removeItem(TOKEN_STORAGE_KEY);
          showAuth(err.message || "Token 校验失败。");
        }
      }

      boot();
    </script>
  </body>
</html>
